<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charge Union ⚡</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="bolt">⚡</span>
            <h1>Charge Union</h1>
        </div>
        
        <p id="status-text">وضع الاختبار (Sandbox Mode)</p>
        
        <div id="user-info" class="user-card" style="display: none;">
            <p>أهلاً بك يا بطل: <br><strong id="username"></strong></p>
        </div>

        <button onclick="login()" id="login-btn">تسجيل الدخول عبر Pi 🔑</button>
        
        <div id="action-buttons" style="display: flex; flex-direction: column; gap: 10px;">
            <button onclick="makePayment()" id="pay-btn" style="display: none;">تجربة دفع 1 Pi 💳</button>
            <button onclick="startSubscription()" id="sub-btn" style="display: none; background: #ffa500; color: white;">تفعيل اشتراك شهري (PiRC2) 🚀</button>
        </div>

        <div class="services" style="margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #ddd;">
                <p style="font-size: 12px; margin: 0;">شحن سريع</p>
                <span style="font-size: 20px;">⚡</span>
            </div>
            <div style="background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #ddd;">
                <p style="font-size: 12px; margin: 0;">دعم تقني</p>
                <span style="font-size: 20px;">🛠️</span>
            </div>
        </div>
        
        <div class="footer">
            <p>المطور: محمد عمار</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

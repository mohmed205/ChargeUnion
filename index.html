<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charger Union - Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f4f4f9;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #673ab7;
            color: white;
            border: none;
            border-radius: 8px;
            margin: 10px;
        }
        button:hover {
            background-color: #512da8;
        }
    </style>
</head>
<body>

    <h1>Charger Union ⚡</h1>
    <p>مرحباً بك في وضع الاختبار (Sandbox Mode)</p>

    <button onclick="login()">تسجيل الدخول عبر Pi 🔑</button>
    <br>
    <button onclick="makePayment()">تجربة عملية دفع 💳</button>

    <script>
      // تهيئة Pi SDK في وضع Sandbox
      Pi.init({ sandbox: true });

      async function login() {
        const scopes = ['username', 'payments'];
        try {
          const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
          alert("أهلاً بك يا " + user.username);
        } catch (error) {
          console.error("فشل تسجيل الدخول:", error);
          alert("حدث خطأ أثناء تسجيل الدخول");
        }
      }

      async function makePayment() {
        try {
          const paymentData = {
            amount: 1, 
            memo: "Test payment for Charger Union",
            metadata: { test: true }
          };

          const payment = await Pi.createPayment(paymentData, {
            onReadyForServerApproval: paymentId => {
              console.log("بانتظار موافقة السيرفر:", paymentId);
            },
            onReadyForServerCompletion: paymentId => {
              console.log("بانتظار إتمام العملية من السيرفر:", paymentId);
            },
            onCancel: paymentId => {
              console.log("تم إلغاء الدفع:", paymentId);
            },
            onError: (error, payment) => {
              console.error("خطأ في الدفع:", error);
            }
          });
        } catch (error) {
          console.error("فشلت العملية:", error);
        }
      }

      function onIncompletePaymentFound(payment) {
        console.log('هناك عملية دفع غير مكتملة:', payment);
      }
    </script>
</body>
</html>

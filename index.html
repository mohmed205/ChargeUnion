<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charger Union - Pi Network</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Charger Union ⚡</h1>
        <p id="status-text">مرحباً بك في وضع الاختبار (Sandbox)</p>

        <div class="user-info" id="user-info" style="display: none;">
            <p>أهلاً بك: <span id="username"></span></p>
        </div>

        <button onclick="login()" id="login-btn">تسجيل الدخول عبر Pi 🔑</button>
        <button onclick="makePayment()" id="pay-btn" style="display: none;">تجربة عملية دفع 💳</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
